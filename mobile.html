<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GS盯盘</title>
<style>
:root{
  --bg:#f5f5f5;--card:#fff;--border:#e8e8e8;
  --text:#1a1a1a;--sub:#999;--up:#e53935;--down:#26a69a;--gold:#b8860b;--blue:#1565c0;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0d1117;--card:#161b22;--border:#21262d;
    --text:#e6edf3;--sub:#8b949e;--up:#f55656;--down:#3fb950;--gold:#d4a853;--blue:#58a6ff;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:70px;
  -webkit-tap-highlight-color:transparent;
}

/* ── 顶部状态栏 ── */
.topbar{
  position:sticky;top:0;z-index:50;background:var(--card);
  border-bottom:1px solid var(--border);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;height:48px;
}
.topbar .brand{font-size:17px;font-weight:800;letter-spacing:-0.5px}
.topbar .brand em{font-style:normal;color:var(--gold)}
.topbar .info{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--sub)}
.topbar .info .d{width:7px;height:7px;border-radius:50%;background:#3fb950}
.topbar .info .d.off{background:#e53935}

/* ── 指数条 ── */
.idx-strip{
  display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);
}
.idx-strip::-webkit-scrollbar{display:none}
.idx-item{
  flex:1;min-width:80px;text-align:center;padding:6px 4px;
  border-right:1px solid var(--border);
}
.idx-item:last-child{border-right:none}
.idx-item .l{font-size:10px;color:var(--sub);margin-bottom:3px}
.idx-item .p{font-size:15px;font-weight:700}
.idx-item .c{font-size:10px;margin-top:1px}

/* ── Tab ── */
.tabs{
  display:flex;background:var(--card);border-bottom:1px solid var(--border);
  padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;padding:11px 16px;font-size:13px;font-weight:600;
  color:var(--sub);border-bottom:2px solid transparent;white-space:nowrap;
  cursor:pointer;transition:color 0.2s;
}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── 行情卡片 ── */
.q-card{
  margin:10px 12px;background:var(--card);border-radius:12px;
  border:1px solid var(--border);overflow:hidden;
}
.q-main{
  display:flex;align-items:center;padding:14px 16px;
}
.q-main .left{flex:1;min-width:0}
.q-main .name{font-size:16px;font-weight:700;line-height:1.3}
.q-main .name .t{
  display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;
  margin-left:6px;vertical-align:middle;font-weight:500;
}
.q-main .name .t.cost{background:rgba(21,101,192,0.12);color:var(--blue)}
.q-main .name .t.hold{background:rgba(184,134,11,0.12);color:var(--gold)}
.q-main .name .t.sig{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.q-main .code{font-size:11px;color:var(--sub);margin-top:2px}
.q-main .price{font-size:22px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums;line-height:1.1}
.q-main .chg-box{text-align:right;margin-top:2px}
.q-main .chg-box span{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px}
.q-meta{
  display:flex;justify-content:space-around;padding:8px 16px 12px;
  font-size:11px;color:var(--sub);border-top:1px solid rgba(128,128,128,0.1);
}
.q-meta b{color:var(--text);font-weight:600}
.q-pnl{font-size:11px;padding:0 16px 10px}

/* ── 策略卡片 ── */
.sig-card{
  margin:10px 12px;background:var(--card);border-radius:12px;
  border:1px solid var(--border);padding:16px;
}
.sig-card .s-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sig-card .s-name{font-size:16px;font-weight:700}
.sig-card .s-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:14px}
.sig-card .s-note{font-size:12px;color:var(--sub);margin-bottom:10px;line-height:1.5}
.sig-card .s-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sig-card .s-item{background:var(--bg);padding:10px 12px;border-radius:8px}
.sig-card .s-item .lbl{font-size:10px;color:var(--sub);margin-bottom:3px}
.sig-card .s-item .val{font-size:13px;font-weight:600}

/* ── 市场判断 ── */
.bias-banner{
  margin:10px 12px;padding:12px 16px;
  background:rgba(184,134,11,0.06);border-left:3px solid var(--gold);
  border-radius:8px;font-size:12px;line-height:1.7;color:var(--text);
}
.bias-banner b{color:var(--gold)}

/* ── 底部 ── */
.btm-bar{
  position:sticky;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--border);padding:10px 16px;
  display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--sub);z-index:50;
}
.btm-bar .state{display:flex;align-items:center;gap:6px}
.btm-bar .state .chip{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600}
.btm-bar .state .chip.live{background:rgba(63,185,80,0.15);color:#3fb950}
.btm-bar .state .chip.off{background:rgba(229,57,53,0.15);color:#e53935}
.btm-bar button{
  background:var(--gold);color:#fff;border:none;padding:7px 20px;
  border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;
}
.btm-bar button:active{opacity:0.7}

.msg-toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#fff;padding:8px 20px;
  border-radius:20px;font-size:12px;font-weight:600;z-index:100;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.msg-toast.show{opacity:1}

.updated-at{text-align:center;font-size:10px;color:var(--sub);padding:8px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">GS<em>盯盘</em></div>
  <div class="info">
    <span class="d" id="dot"></span>
    <span id="clock">--:--</span>
  </div>
</div>

<div class="idx-strip" id="idxBar"></div>

<div class="tabs" id="tabBar">
  <span class="tab on" data-t="all">全部</span>
  <span class="tab" data-t="pos">持仓</span>
  <span class="tab" data-t="strat">📋 策略</span>
</div>

<div id="main"></div>

<div class="btm-bar">
  <div class="state">
    <span>数据源：东方财富</span>
    <span class="chip live" id="stateChip">就绪</span>
  </div>
  <button onclick="refresh()">⟳ 刷新</button>
</div>
<div class="msg-toast" id="toast"></div>

<script>
// ======== 股票配置（修改这里即可） ========
const POS = [
  {c:'600186',m:1,n:'莲花控股',cost:14.43,sh:100},
  {c:'000066',m:0,n:'中国长城',cost:19.00,sh:300},
  {c:'159819',m:0,n:'AI ETF',   cost:2.0992,sh:3200},
];
const WATCH = [
  {c:'000063',m:0,n:'中兴通讯'},{c:'601138',m:1,n:'工业富联'},{c:'603296',m:1,n:'华勤技术'},
];
const ETF = [
  {c:'588000',m:1,n:'科创50'},{c:'560080',m:1,n:'中药'},{c:'515880',m:1,n:'通信'},{c:'517380',m:1,n:'创新药'},{c:'588200',m:1,n:'科创芯片'},
];
const IDX = [
  {c:'000001',m:1,n:'上证'},{c:'399001',m:0,n:'深证'},{c:'399006',m:0,n:'创业板'},{c:'000688',m:1,n:'科创50'},
];

// ======== 策略数据（内嵌，更新时改这里） ========
const STRAT = {
  updated:'2026-07-13 23:00',
  bias:'震荡偏弱。科技三连跌有超卖反弹需求，但长鑫IPO抽血前资金面偏紧。医药/消费走强对冲。周二关注中报预告最后冲刺，周三GDP+周四长鑫打新是本周关键节点。',
  pos:[
    {c:'000066',sg:'⚠️ 减仓警戒',cl:'#e53935',act:'持有·谨慎',entry:'条件单<19.00已触发',stop:'跌破17.92减半(150股)；17.50清仓',target:'反弹19.50-20.00减仓',note:'今日-7.2%跌破所有均线，明天不能创新低'},
    {c:'600186',sg:'🟡 筑底观望',cl:'#b8860b',act:'持有·等突破',entry:'放量突破11.20(MA60)→加仓100股；回踩10.70-10.80企稳→加仓',stop:'收盘跌破10.50止损清仓',target:'11.75(MA10)→12.91(MA20)',note:'平台筑底第6天，今日放量小阳线偏积极，等突破确认'},
    {c:'159819',sg:'🟢 正常持有',cl:'#26a69a',act:'持有',entry:'回踩2.00-2.02加仓1600股',stop:'收盘跌破1.96减半',target:'突破2.10看2.15→2.20',note:'MA5/10/20三线粘合≈2.08，变盘窗口，WAIC周五催化'},
  ],
  watch:[
    {c:'000063',sg:'🟢 可建仓',cl:'#26a69a',act:'首选出击',entry:'39.00-40.00主动买入；37.50-38.50加仓',stop:'37.50',target:'43→48',note:'全市场最强抗跌，主力5日净买+55亿'},
    {c:'601138',sg:'🟡 观望',cl:'#b8860b',act:'等止跌',entry:'65-66试探；63-64加仓',stop:'跌破61不碰',target:'70→75',note:'连跌5天无反弹，等连续3天不创新低'},
    {c:'603296',sg:'🔴 不追',cl:'#e53935',act:'远离',entry:'等回调75-80',stop:'-',target:'-',note:'两周涨太多，高位风险极大'},
  ],
  etf:[
    {c:'588000',sg:'🟢 建仓',cl:'#26a69a',act:'逢低买入',entry:'2.08-2.12',stop:'2.02',target:'2.30→2.40'},
    {c:'560080',sg:'🟢 优先',cl:'#26a69a',act:'优先建仓',entry:'0.95-0.97',stop:'0.92',target:'1.05→1.10',note:'最强对冲，与科技负相关'},
    {c:'515880',sg:'🟢 埋伏',cl:'#26a69a',act:'WAIC前低吸',entry:'MA20附近',note:'华为Atlas 7/17催化'},
    {c:'517380',sg:'🟡 等回调',cl:'#b8860b',act:'等低吸',entry:'MA10附近',note:'基药目录利好，连涨后等回调'},
    {c:'588200',sg:'🔴 暂避',cl:'#e53935',act:'长鑫后再看',note:'长鑫打新抽血最严重板块'},
  ]
};

// ======== 核心逻辑 ========
const M={0:'0',1:'1'};
function sid(s){return M[s.m]+'.'+s.c}
function apiUrl(list){
  return 'https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f4,f12,f14,f15,f16,f17,f18&secids='+list.map(s=>sid(s)).join(',');
}
const allCodes=[...IDX,...POS,...WATCH,...ETF];
const uq=allCodes.filter((s,i,a)=>a.findIndex(x=>x.c===s.c)===i);

function f(n,d=2){if(n==null||isNaN(n))return'--';return Number(n).toFixed(d)}
function up(v){return v>=0?'up':'dn'}
function sig(c){
  const all=[...(STRAT.pos||[]),...(STRAT.watch||[]),(STRAT.etf||[])];
  return all.find(s=>s.c===c);
}

// ── 渲染 ──
function render(){
  // 指数
  let ih='';
  IDX.forEach(i=>{
    const d=i._d;if(!d)return;
    ih+='<div class="idx-item"><div class="l">'+i.n+'</div><div class="p" style="color:'+(d.changePct>=0?'var(--up)':'var(--down)')+'">'+f(d.price)+'</div><div class="c" style="color:'+(d.changePct>=0?'var(--up)':'var(--down)')+'">'+(d.changePct>=0?'+':'')+f(d.changePct,2)+'%</div></div>';
  });
  document.getElementById('idxBar').innerHTML=ih||'<div style="padding:8px;color:var(--sub)">加载中...</div>';

  // 行情卡片生成函数
  function qc(s,held){
    const d=s._d;if(!d)return'<div class="q-card"><div class="q-main"><div class="left"><div class="name">'+s.n+'</div><div class="code">'+s.c+' 等待...</div></div></div></div>';
    const sgn=sig(s.c);
    let tags='';
    if(held&&s.cost){tags='<span class="t cost">成本'+s.cost+'</span><span class="t hold">'+s.sh+'股</span>'}
    if(sgn){tags+='<span class="t sig" style="background:'+(sgn.cl||'#b8860b')+'15;color:'+(sgn.cl||'#b8860b')+'">'+sgn.sg+'</span>'}
    let pnl='';
    if(held&&s.cost&&s.sh&&d.price){const pct=(d.price-s.cost)/s.cost*100;const amt=(d.price-s.cost)*s.sh;pnl='<div class="q-pnl" style="color:'+(pct>=0?'var(--up)':'var(--down)')+'">浮'+(pct>=0?'盈':'亏')+' '+f(pct,1)+'% | '+f(amt,0)+'元</div>'}
    return '<div class="q-card"><div class="q-main"><div class="left"><div class="name">'+s.n+' '+tags+'</div><div class="code">'+s.c+'</div></div><div class="price" style="color:'+(d.changePct>=0?'var(--up)':'var(--down)')+'">'+f(d.price)+'</div><div class="chg-box"><span style="background:'+(d.changePct>=0?'rgba(229,57,53,0.12)':'rgba(38,166,154,0.12)')+';color:'+(d.changePct>=0?'var(--up)':'var(--down)')+'">'+(d.changePct>=0?'+':'')+f(d.changePct,2)+'%</span></div></div>'+pnl+'<div class="q-meta"><span>开<b>'+f(d.open)+'</b></span><span>高<b>'+f(d.high)+'</b></span><span>低<b>'+f(d.low)+'</b></span><span>昨<b>'+f(d.close)+'</b></span></div></div>';
  }

  // 持仓
  let ph='';let tv=0,tp=0;
  POS.forEach(s=>{const d=s._d;if(d&&d.price&&s.cost&&s.sh){tv+=d.price*s.sh;tp+=(d.price-s.cost)*s.sh}ph+=qc(s,true);});
  ph='<div style="font-size:12px;color:var(--sub);padding:4px 16px;font-weight:600">💰 持仓 · 总市值<b style="color:var(--text);margin:0 4px">'+f(tv,0)+'元</b> <span style="color:'+(tp>=0?'var(--up)':'var(--down)')+'">浮'+(tp>=0?'盈':'亏')+' '+f(tp,0)+'元</span></div>'+ph;

  // 关注
  let wh='<div style="font-size:12px;color:var(--sub);padding:8px 16px 0;font-weight:600">👀 关注</div>';
  WATCH.forEach(s=>{wh+=qc(s,false)});

  // ETF
  let eh='<div style="font-size:12px;color:var(--sub);padding:8px 16px 0;font-weight:600">📦 ETF</div>';
  ETF.forEach(s=>{eh+=qc(s,false)});

  // 策略面板
  let sh='';
  if(STRAT.bias){sh+='<div class="bias-banner"><b>📌 市场判断</b><br>'+STRAT.bias+'</div>'}
  if(STRAT.pos){sh+='<div style="font-size:12px;color:var(--sub);padding:8px 16px 0;font-weight:600">💰 持仓操作建议</div>';STRAT.pos.forEach(p=>{sh+='<div class="sig-card"><div class="s-top"><span class="s-name">'+p.n+' ('+p.c+')</span><span class="s-badge" style="background:'+(p.cl||'#b8860b')+'15;color:'+(p.cl||'#b8860b')+'">'+p.sg+'</span></div><div class="s-note">'+p.act+' · '+p.note+'</div><div class="s-grid"><div class="s-item"><div class="lbl">🟢 买入/加仓</div><div class="val">'+p.entry+'</div></div><div class="s-item"><div class="lbl">🔴 止损</div><div class="val" style="color:var(--up)">'+p.stop+'</div></div><div class="s-item"><div class="lbl">🎯 目标</div><div class="val">'+p.target+'</div></div></div></div>'})}
  if(STRAT.watch){sh+='<div style="font-size:12px;color:var(--sub);padding:8px 16px 0;font-weight:600">👀 关注个股</div>';STRAT.watch.forEach(w=>{sh+='<div class="sig-card"><div class="s-top"><span class="s-name">'+w.n+' ('+w.c+')</span><span class="s-badge" style="background:'+(w.cl||'#b8860b')+'15;color:'+(w.cl||'#b8860b')+'">'+w.act+'</span></div><div class="s-note">'+w.note+'</div><div class="s-grid"><div class="s-item"><div class="lbl">🟢 入场区间</div><div class="val">'+w.entry+'</div></div><div class="s-item"><div class="lbl">🔴 止损</div><div class="val" style="color:var(--up)">'+w.stop+'</div></div><div class="s-item"><div class="lbl">🎯 目标</div><div class="val">'+w.target+'</div></div></div></div>'})}
  if(STRAT.etf){sh+='<div style="font-size:12px;color:var(--sub);padding:8px 16px 0;font-weight:600">📦 ETF建议</div>';STRAT.etf.forEach(e=>{sh+='<div class="sig-card"><div class="s-top"><span class="s-name">'+e.n+' ('+e.c+')</span><span class="s-badge" style="background:'+(e.cl||'#b8860b')+'15;color:'+(e.cl||'#b8860b')+'">'+e.act+'</span></div><div class="s-note">'+(e.note||'')+'</div><div class="s-grid"><div class="s-item"><div class="lbl">🟢 入场</div><div class="val">'+e.entry+'</div></div><div class="s-item"><div class="lbl">🎯 目标</div><div class="val">'+e.target+'</div></div></div></div>'})}
  if(STRAT.updated){sh+='<div class="updated-at">📅 策略更新：'+STRAT.updated+'</div>'}

  document.getElementById('main').innerHTML=tabMode==='strat'?sh:tabMode==='pos'?ph:ph+wh+eh;
}

// ── 数据 ──
let tabMode='all',fail=0;
async function fetchQuotes(){
  try{
    const resp=await fetch(apiUrl(uq));
    if(!resp.ok)throw new Error('');
    const j=await resp.json();
    const list=(j.data&&j.data.diff)?j.data.diff:[];
    list.forEach(it=>{uq.forEach(s=>{if(s.c===it.f12)s._d={name:it.f14||'',price:parseFloat(it.f2)||0,changePct:parseFloat(it.f3)||0,change:parseFloat(it.f4)||0,high:parseFloat(it.f15)||0,low:parseFloat(it.f16)||0,open:parseFloat(it.f17)||0,close:parseFloat(it.f18)||0}})})});
    fail=0;document.getElementById('dot').classList.remove('off');render();
  }catch(e){fail++;if(fail>=3)document.getElementById('dot').classList.add('off');}
}

// ── 定时 ──
function interval(){
  const n=new Date(),d=n.getDay(),h=n.getHours(),m=n.getMinutes();
  if(d===0||d===6)return 300000;
  const td=d>=1&&d<=5&&((h===9&&m>=30)||h===10||h===11||(h===11&&m<=30)||h===13||h===14||(h===15&&m===0));
  if(td)return 30000;
  return 60000;
}
function tick(){
  const n=new Date();document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  const d=n.getDay(),h=n.getHours(),m=n.getMinutes();
  const td=d>=1&&d<=5&&((h===9&&m>=30)||h===10||h===11||(h===11&&m<=30)||h===13||h===14||(h===15&&m===0));
  const c=document.getElementById('stateChip');
  if(td){c.textContent='交易中';c.className='chip live'}else{c.textContent='盘后';c.className='chip off'}
}
let tmr;
function loop(){clearTimeout(tmr);fetchQuotes().then(()=>{tmr=setTimeout(loop,interval())}).catch(()=>{tmr=setTimeout(loop,60000)})}
document.addEventListener('visibilitychange',()=>{clearTimeout(tmr);if(!document.hidden){fetchQuotes();tmr=setTimeout(loop,interval())}else tmr=setTimeout(loop,300000)});

// ── Tab ──
document.getElementById('tabBar').addEventListener('click',e=>{
  if(e.target.classList.contains('tab')){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    e.target.classList.add('on');tabMode=e.target.dataset.t;render();
  }
});

function refresh(){
  const t=document.getElementById('toast');t.textContent='刷新中...';t.classList.add('show');
  fetchQuotes().then(()=>{t.textContent='✅ 已刷新';setTimeout(()=>t.classList.remove('show'),1200)});
}

// ── 启动 ──
fetchQuotes().then(()=>{render();tmr=setTimeout(loop,interval())});
setInterval(tick,30000);tick();
