<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GSзӣҜзӣҳ</title>
<style>
:root{--bg:#0a0a0f;--card:rgba(20,20,35,0.9);--card2:rgba(30,30,50,0.8);--border:rgba(255,255,255,0.06);--text:#e8e8f0;--sub:#8888aa;--up:#ff4757;--down:#2ed573;--gold:#f0c060;--blue:#5b9bd5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent;background-image:radial-gradient(ellipse at 20% 0%,rgba(240,192,96,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 0%,rgba(91,155,213,0.04) 0%,transparent 50%)}
.topbar{position:sticky;top:0;z-index:99;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px}
.topbar .brand{font-size:20px;font-weight:900;letter-spacing:-1px}
.topbar .brand .gs{background:linear-gradient(135deg,#f0c060,#d4a853);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .info{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--sub)}
.topbar .d{width:8px;height:8px;border-radius:50%;background:#2ed573;box-shadow:0 0 8px rgba(46,213,115,0.6)}
.topbar .d.off{background:#ff4757;box-shadow:0 0 8px rgba(255,71,87,0.6)}
.idx-strip{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px;gap:8px;background:rgba(20,20,35,0.5);border-bottom:1px solid var(--border)}
.idx-strip::-webkit-scrollbar{display:none}
.idx-item{flex:0 0 auto;min-width:90px;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:12px;text-align:center;backdrop-filter:blur(10px)}
.idx-item .l{font-size:10px;color:var(--sub);margin-bottom:4px;letter-spacing:1px}
.idx-item .p{font-size:16px;font-weight:800;margin-bottom:2px}
.idx-item .c{font-size:10px;font-weight:600}
.tab-wrap{position:sticky;top:50px;z-index:98;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:6px}
.tab-btn{flex:1;padding:10px 0;font-size:14px;font-weight:700;color:var(--sub);background:transparent;border:none;border-radius:10px;cursor:pointer;text-align:center;transition:all 0.2s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.tab-btn:active{background:rgba(255,255,255,0.05)}
.tab-btn.on{color:var(--gold);background:rgba(240,192,96,0.1);box-shadow:0 0 20px rgba(240,192,96,0.1)}
.qc{margin:10px 12px;border-radius:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;position:relative;backdrop-filter:blur(10px)}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,192,96,0.3),transparent)}
.qc-main{display:flex;align-items:center;padding:16px}
.qc-main .L{flex:1;min-width:0}
.qc-main .N{font-size:17px;font-weight:800;line-height:1.3}
.qc-main .N .tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;font-weight:600}
.qc-main .N .tag.cost{background:rgba(91,155,213,0.15);color:var(--blue)}
.qc-main .N .tag.hold{background:rgba(240,192,96,0.15);color:var(--gold)}
.qc-main .N .tag.sig{font-size:9px;padding:2px 7px;border-radius:4px}
.qc-main .sub{font-size:11px;color:var(--sub);margin-top:3px}
.qc-main .pr{font-size:24px;font-weight:900;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.qc-meta{display:flex;justify-content:space-around;padding:0 16px 12px;font-size:10px;color:var(--sub)}
.qc-meta b{color:var(--text);font-weight:600}
.qc-pnl{padding:0 16px 12px;font-size:11px;font-weight:600}
.sc{margin:10px 12px;border-radius:14px;background:var(--card);border:1px solid var(--border);padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,192,96,0.3),transparent)}
.sc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sc-name{font-size:16px;font-weight:800}
.sc-badge{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px}
.sc-note{font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.6}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc-gi{background:var(--card2);padding:10px 12px;border-radius:10px;border:1px solid var(--border)}
.sc-gi .lbl{font-size:10px;color:var(--sub);margin-bottom:3px}
.sc-gi .val{font-size:13px;font-weight:700;line-height:1.4}
.sc-gi.full{grid-column:1/-1}
.bias{margin:10px 12px;padding:14px 16px;background:linear-gradient(135deg,rgba(240,192,96,0.06),rgba(212,168,83,0.02));border:1px solid rgba(240,192,96,0.15);border-radius:12px;font-size:12px;line-height:1.7}
.bias b{color:var(--gold)}
.section-label{font-size:11px;color:var(--sub);padding:16px 16px 4px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btm{position:sticky;bottom:0;z-index:99;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--sub)}
.btm .chip{padding:4px 12px;border-radius:12px;font-size:10px;font-weight:700}
.btm .chip.live{background:rgba(46,213,115,0.12);color:#2ed573}
.btm .chip.off{background:rgba(255,71,87,0.12);color:#ff4757}
.btm button{background:linear-gradient(135deg,#f0c060,#c89630);color:#000;border:none;padding:8px 22px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(240,192,96,0.25)}
.btm button:active{transform:scale(0.95);opacity:0.8}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 8px 30px rgba(240,192,96,0.3)}
.toast.show{opacity:1}
.ft{text-align:center;font-size:10px;color:var(--sub);padding:12px;opacity:0.5}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qc,.sc{animation:slideUp 0.3s ease-out}
</style>
</head>
<body>
<div class="topbar"><div class="brand"><span class="gs">GS</span>зӣҜзӣҳ</div><div class="info"><span class="d" id="dot"></span><span id="clock">--:--</span></div></div>
<div class="idx-strip" id="idxBar"></div>
<div class="tab-wrap">
<button class="tab-btn on" data-t="all" onclick="switchTab('all')">е…ЁйғЁ</button>
<button class="tab-btn" data-t="pos" onclick="switchTab('pos')">жҢҒд»“</button>
<button class="tab-btn" data-t="strat" onclick="switchTab('strat')">зӯ–з•Ҙ</button>
</div>
<div id="main"></div>
<div class="btm">
<span class="chip live" id="stateChip">е°ұз»Ә</span>
<span id="stMsg">дёңж–№иҙўеҜҢВ·е®һж—¶иЎҢжғ…</span>

</div>
<div class="toast" id="toast"></div>

<script>
var POS=[
  {c:'000066',m:0,n:'дёӯеӣҪй•ҝеҹҺ',cost:19.00,sh:300},
  {c:'159819',m:0,n:'AI ETF',cost:2.0992,sh:3200}
];
var WATCH=[
  {c:'000063',m:0,n:'дёӯе…ҙйҖҡи®Ҝ'},{c:'601138',m:1,n:'е·ҘдёҡеҜҢиҒ”'},
  {c:'600988',m:1,n:'иөӨеі°й»„йҮ‘'},{c:'000776',m:0,n:'е№ҝеҸ‘иҜҒеҲё'}
];
var ETF=[
  {c:'588000',m:1,n:'з§‘еҲӣ50'},{c:'560080',m:1,n:'дёӯиҚҜ'},
  {c:'515880',m:1,n:'йҖҡдҝЎ'},{c:'515050',m:1,n:'йҖҡдҝЎеҚҺеӨҸ'},{c:'517380',m:1,n:'еҲӣж–°иҚҜ'}
];
var IDX=[
  {c:'000001',m:1,n:'дёҠиҜҒ'},{c:'399001',m:0,n:'ж·ұиҜҒ'},
  {c:'399006',m:0,n:'еҲӣдёҡжқҝ'},{c:'000688',m:1,n:'з§‘еҲӣ50'}
];
var STRAT={
  updated:'2026-07-14 23:30',
  bias:'ж·ұVеӨ§еҘҮиҝ№ж—ҘпјҒдёҠиҜҒзӣҳдёӯи·Ңз ҙ3900еҗҺжҡҙеҠӣжӢүеӣһж”¶+1.36%пјҢ4200+иӮЎйЈҳзәўгҖӮеҚҺдёәжҰӮеҝө+329дәҝгҖҒAI+225дәҝдё»еҠӣеӨ§дёҫжөҒе…ҘгҖӮйҖҡдҝЎETF+6.6%йўҶж¶ЁгҖӮжҳҺж—Ҙ(7/15)GDPе…¬еёғ+й•ҝй‘«жү“ж–°еүҚжңҖеҗҺдёҖеӨ©+WAICејҖе№•пјҢжіўеҠЁеҠ еү§гҖӮдёӯеӣҪй•ҝеҹҺзӣҳеҗҺдёҡз»©пјҡеҪ’жҜҚ+66~138%дҪҶжүЈйқһдәҸжҚҹ2.8-4.2дәҝвҖ”вҖ”е®һиҙЁеҲ©з©әпјҢдё»еҠӣжҸҗеүҚдёӨеӨ©з ёзӣҳгҖӮ',
  pos:[
    {c:'000066',sg:'зҙ§жҖҘВ·дёҡз»©жҡҙйӣ·',cl:'#ff4757',act:'жүЈйқһдәҸжҚҹпјҒжҳҺеӨ©е®ЎеҲӨж—Ҙ',entry:'еҪ’жҜҚ2.3-3.3дәҝ(+66-138%)пјҢдҪҶжүЈйқһдәҸжҚҹ2.8-4.2дәҝгҖӮеҲ©ж¶Ұе…Ёйқ еҚ–жҲҝ+иЎҘиҙҙ6.1-6.5дәҝ(дёҖж¬ЎжҖ§)гҖӮ',stop:'ејҖзӣҳжҢӮ16.25еҚ–еҮәжқЎд»¶еҚ•гҖӮз ҙд»Ҡж—ҘжңҖдҪҺвҶ’ж— жқЎд»¶жё…д»“',target:'еҸҚеј№еҲ°17.50-18.00еҮҸд»“дёҖеҚҠ',note:'PE 165-235еҖҚжһҒеәҰй«ҳдј°гҖӮжүЈйқһдәҸжҚҹ=дё»иҗҘдёҡеҠЎдәҸй’ұпјҒдё»еҠӣдёӨеӨ©еүҚе·ІжҠўи·‘з ёзӣҳгҖӮжҳҺеӨ©жҳҜеёӮеңәзңҹе®һеҸҚеә”ж—ҘгҖӮ'},
    {c:'159819',sg:'жҢҒжңүВ·WAICеӮ¬еҢ–',cl:'#2ed573',act:'жҢҒжңүВ·еҸҜеҠ д»“',entry:'еӣһиё©2.02-2.05еҠ д»“1600иӮЎ',stop:'ж”¶зӣҳ<1.96еҮҸеҚҠ',target:'WAICе‘Ёдә”17еҸ·е…‘зҺ°пјҢзӣ®ж Ү2.20-2.30',note:'д»Ҡж—Ҙ+1.66%гҖӮAI+225дәҝдё»еҠӣжөҒе…ҘгҖӮWAICжҳҺеӨ©ејҖе№•пјҢйҖҡдҝЎ/з®—еҠӣжңҖејәдё»зәҝгҖӮ'}
  ],
  watch:[
    {c:'000063',sg:'йҰ–йҖүеҮәеҮ»',cl:'#2ed573',act:'39-40дё»еҠЁд№°е…Ҙ',entry:'39-40д№°е…Ҙпјӣ37.50-38.50еҠ д»“(MA20/60еҸҢйҮҚж”Ҝж’‘)',stop:'37.50',target:'43-48',note:'д»Ҡж—Ҙд»…-0.32%пјҢVеҸҚдёӯзЁіеҰӮзЈҗзҹігҖӮ5ж—Ҙдё»еҠӣ+50дәҝгҖӮWAICеҚҺдёәAtlasеӮ¬еҢ–зӣҙжҺҘеҲ©еҘҪгҖӮ'},
    {c:'601138',sg:'жӯўи·ҢеҸҚеј№',cl:'#2ed573',act:'еҸҜиҜ•жҺўе…Ҙеңә',entry:'д»Ҡж—Ҙ+3.99%жӯўдҪҸдә”иҝһи·ҢпјҢ65-66иҜ•жҺў',stop:'и·Ңз ҙ62жӯўжҚҹ',target:'70-75',note:'дә”иҝһи·ҢеҗҺйҰ–йҳіпјҢWAICеӮ¬еҢ–AIжңҚеҠЎеҷЁйңҖжұӮгҖӮ'},
    {c:'600988',sg:'иҙөйҮ‘еұһйҫҷ',cl:'#f0c060',act:'зӯүеӣһи°ғ',entry:'д»Ҡж—Ҙ+8.1%иҝҮеӨ§пјҢзӯү5ж—Ҙзәҝйҷ„иҝ‘',note:'PE 17.3еҗҲзҗҶпјҢдёӯжҠҘзЎ®е®ҡжҖ§й«ҳгҖӮ'},
    {c:'000776',sg:'еҲёе•Ҷд»·еҖј',cl:'#f0c060',act:'зӯүеӣһи°ғ',entry:'PEд»…9.5пјҢеҲёе•ҶжңҖдҪҺд№ӢдёҖ',note:'д»Ҡж—Ҙ+4%йҡҸеӨ§зӣҳеҸҚеј№гҖӮ'}
  ],
  etf:[
    {c:'515880',sg:'жңҖејәдё»зәҝ',cl:'#2ed573',act:'WAICеүҚдјҳе…Ҳ',entry:'д»Ҡж—Ҙ+6.56%йўҶж¶ЁETFпјҢеӣһи°ғMA10еҠ д»“',note:'еҚҺдёәжҰӮеҝө+329дәҝпјҒWAICжҳҺеӨ©ејҖе№•гҖӮ'},
    {c:'515050',sg:'йҖҡдҝЎеҸҢйӣ„',cl:'#2ed573',act:'еҗҢдёҠ',entry:'дёҺ515880еҗҢж–№еҗ‘пјҢжөҒеҠЁжҖ§жӣҙеҘҪ',note:''},
    {c:'560080',sg:'жҢҒжңү',cl:'#2ed573',act:'з»§з»ӯжҢҒжңү',entry:'0.95-0.97еҸҜеҠ ',stop:'0.92',target:'1.05-1.10',note:'дә”иҝһйҳі+7.9%пјҢжңҖејәйҳІеҫЎгҖӮ'},
    {c:'588000',sg:'зӯүеӣһи°ғ',cl:'#f0c060',act:'йҖўдҪҺе»әд»“',entry:'2.05-2.10',stop:'2.00',target:'2.25-2.35'},
    {c:'517380',sg:'зӯүеӣһи°ғ',cl:'#f0c060',act:'еҹәиҚҜзӣ®еҪ•еӮ¬еҢ–',note:'иҝһж¶ЁеҗҺзӯүдҪҺеҗёгҖӮ'}
  ]
};
var M={0:'0',1:'1'};
function sid(s){return M[s.m]+'.'+s.c}
var UQ=(function(){var s=IDX.concat(POS).concat(WATCH).concat(ETF);var m={};return s.filter(function(x){if(m[x.c])return false;m[x.c]=true;return true})})();

function f(n,d){d=d||2;if(n==null||isNaN(n))return'--';return Number(n).toFixed(d)}
function lookupName(c){var all=POS.concat(WATCH).concat(ETF).concat(IDX);var s=all.find(function(x){return x.c===c});return s?s.n:c}
function lookupSig(c){var all=(STRAT.pos||[]).concat(STRAT.watch||[]).concat(STRAT.etf||[]);return all.find(function(s){return s.c===c})||null}

var tabMode='all',fail=0,tmr=null;

function render(){
  var ih='';
  IDX.forEach(function(i){var d=i._d;if(!d)return;var cl=d.changePct>=0?'#ff4757':'#2ed573';ih+='<div class="idx-item"><div class="l">'+i.n+'</div><div class="p" style="color:'+cl+'">'+f(d.price)+'</div><div class="c" style="color:'+cl+'">'+(d.changePct>=0?'+':'')+f(d.changePct,2)+'%</div></div>'});
  document.getElementById('idxBar').innerHTML=ih||'<div style="padding:12px;color:var(--sub);text-align:center">еҠ иҪҪдёӯ...</div>';

  function card(s,held){
    var d=s._d;if(!d)return'<div class="qc"><div class="qc-main"><div class="L"><div class="N">'+s.n+'</div><div class="sub">'+s.c+' В· зӯүеҫ…ж•°жҚ®</div></div></div></div>';
    var sg=lookupSig(s.c),cl=d.changePct>=0?'#ff4757':'#2ed573',tags='';
    if(held&&s.cost){tags='<span class="tag cost">жҲҗжң¬'+s.cost+'</span><span class="tag hold">'+s.sh+'иӮЎ</span>'}
    if(sg)tags+='<span class="tag sig" style="background:'+(sg.cl||'#f0c060')+'15;color:'+(sg.cl||'#f0c060')+'">'+sg.sg+'</span>';
    var pnl='';if(held&&s.cost&&s.sh&&d.price){var pct=(d.price-s.cost)/s.cost*100,amt=(d.price-s.cost)*s.sh;pnl='<div class="qc-pnl" style="color:'+(pct>=0?'#ff4757':'#2ed573')+'">жө®'+(pct>=0?'зӣҲ':'дәҸ')+' '+f(pct,1)+'% | '+f(amt,0)+'е…ғ</div>'}
    return'<div class="qc"><div class="qc-main"><div class="L"><div class="N">'+s.n+' '+tags+'</div><div class="sub">'+s.c+'</div></div><div class="pr" style="color:'+cl+'">'+f(d.price)+'</div></div>'+pnl+'<div class="qc-meta"><span>д»ҠејҖ<b>'+f(d.open)+'</b></span><span>жңҖй«ҳ<b>'+f(d.high)+'</b></span><span>жңҖдҪҺ<b>'+f(d.low)+'</b></span><span>жҳЁж”¶<b>'+f(d.close)+'</b></span></div></div>';
  }

  var ph='',tv=0,tp=0;
  POS.forEach(function(s){var d=s._d;if(d&&d.price&&s.cost&&s.sh){tv+=d.price*s.sh;tp+=(d.price-s.cost)*s.sh}ph+=card(s,true)});
  ph='<div class="section-label">жҢҒд»“ В· еёӮеҖј'+f(tv,0)+'е…ғ <span style="color:'+(tp>=0?'#ff4757':'#2ed573')+'">жө®'+(tp>=0?'зӣҲ':'дәҸ')+' '+f(tp,0)+'е…ғ</span></div>'+ph;
  var wh='<div class="section-label">е…іжіЁдёӘиӮЎ</div>';WATCH.forEach(function(s){wh+=card(s,false)});
  var eh='<div class="section-label">ETF</div>';ETF.forEach(function(s){eh+=card(s,false)});

  var sh='';
  if(STRAT.bias)sh+='<div class="bias"><b>еёӮеңәеҲӨж–ӯ</b><br>'+STRAT.bias+'</div>';
  if(STRAT.pos){sh+='<div class="section-label">жҢҒд»“ж“ҚдҪңе»әи®®</div>';STRAT.pos.forEach(function(p){sh+='<div class="sc"><div class="sc-head"><span class="sc-name">'+lookupName(p.c)+' ('+p.c+')</span><span class="sc-badge" style="background:'+(p.cl||'#f0c060')+'15;color:'+(p.cl||'#f0c060')+'">'+p.sg+'</span></div><div class="sc-note"><b>'+p.act+'</b> В· '+p.note+'</div><div class="sc-grid"><div class="sc-gi"><div class="lbl">д№°е…Ҙ/еҠ д»“</div><div class="val">'+p.entry+'</div></div><div class="sc-gi"><div class="lbl">жӯўжҚҹ</div><div class="val" style="color:#ff4757">'+p.stop+'</div></div><div class="sc-gi full"><div class="lbl">зӣ®ж Ү</div><div class="val">'+p.target+'</div></div></div></div>'})}
  if(STRAT.watch){sh+='<div class="section-label">е…іжіЁдёӘиӮЎ</div>';STRAT.watch.forEach(function(w){sh+='<div class="sc"><div class="sc-head"><span class="sc-name">'+lookupName(w.c)+' ('+w.c+')</span><span class="sc-badge" style="background:'+(w.cl||'#f0c060')+'15;color:'+(w.cl||'#f0c060')+'">'+w.act+'</span></div><div class="sc-note">'+w.note+'</div><div class="sc-grid"><div class="sc-gi"><div class="lbl">е…ҘеңәеҢәй—ҙ</div><div class="val">'+w.entry+'</div></div><div class="sc-gi"><div class="lbl">жӯўжҚҹ</div><div class="val" style="color:#ff4757">'+w.stop+'</div></div><div class="sc-gi full"><div class="lbl">зӣ®ж Ү</div><div class="val">'+w.target+'</div></div></div></div>'})}
  if(STRAT.etf){sh+='<div class="section-label">ETFе»әи®®</div>';STRAT.etf.forEach(function(e){sh+='<div class="sc"><div class="sc-head"><span class="sc-name">'+lookupName(e.c)+' ('+e.c+')</span><span class="sc-badge" style="background:'+(e.cl||'#f0c060')+'15;color:'+(e.cl||'#f0c060')+'">'+e.act+'</span></div><div class="sc-note">'+(e.note||'')+'</div><div class="sc-grid"><div class="sc-gi"><div class="lbl">е…Ҙеңә</div><div class="val">'+e.entry+'</div></div><div class="sc-gi"><div class="lbl">зӣ®ж Ү</div><div class="val">'+e.target+'</div></div></div></div>'})}
  sh+='<div class="ft">зӯ–з•Ҙжӣҙж–°дәҺ '+STRAT.updated+'</div>';

  document.getElementById('main').innerHTML=tabMode==='strat'?sh:tabMode==='pos'?ph:ph+wh+eh;
}

async function fetchQuotes(){
  try{
    var url='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f4,f12,f14,f15,f16,f17,f18&secids='+UQ.map(function(s){return sid(s)}).join(',');
    var resp=await fetch(url);
    if(!resp.ok)throw new Error('');
    var j=await resp.json();
    var list=(j.data&&j.data.diff)?j.data.diff:[];
    list.forEach(function(it){UQ.forEach(function(s){if(s.c===it.f12)s._d={name:it.f14||'',price:parseFloat(it.f2)||0,changePct:parseFloat(it.f3)||0,change:parseFloat(it.f4)||0,high:parseFloat(it.f15)||0,low:parseFloat(it.f16)||0,open:parseFloat(it.f17)||0,close:parseFloat(it.f18)||0}})});
    fail=0;document.getElementById('dot').classList.remove('off');render();
  }catch(e){fail++;if(fail>=3)document.getElementById('dot').classList.add('off')}
}

function interval(){
  var n=new Date(),d=n.getDay(),h=n.getHours(),m=n.getMinutes();
  if(d===0||d===6)return 300000;
  var td=d>=1&&d<=5&&((h===9&&m>=30)||h===10||h===11||(h===11&&m<=30)||h===13||h===14||(h===15&&m===0));
  return td?30000:60000;
}
function tick(){
  var n=new Date();document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  var d=n.getDay(),h=n.getHours(),m=n.getMinutes();
  var td=d>=1&&d<=5&&((h===9&&m>=30)||h===10||h===11||(h===11&&m<=30)||h===13||h===14||(h===15&&m===0));
  var c=document.getElementById('stateChip'),m2=document.getElementById('stMsg');
  if(td){c.textContent='дәӨжҳ“дёӯ';c.className='chip live';m2.textContent='еҲ·ж–°й—ҙйҡ”30з§’'}else{c.textContent='зӣҳеҗҺ';c.className='chip off';m2.textContent='еҲ·ж–°й—ҙйҡ”60з§’'}
}
function loop(){clearTimeout(tmr);fetchQuotes().then(function(){tmr=setTimeout(loop,interval())}).catch(function(){tmr=setTimeout(loop,60000)})}
function switchTab(t){tabMode=t;document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on')});document.querySelector('.tab-btn[data-t="'+t+'"]').classList.add('on');render()}
document.addEventListener('visibilitychange',function(){clearTimeout(tmr);if(!document.hidden){fetchQuotes();tmr=setTimeout(loop,interval())}else tmr=setTimeout(loop,300000)});
function refresh(){var t=document.getElementById('toast');t.textContent='еҲ·ж–°дёӯ...';t.classList.add('show');fetchQuotes().then(function(){t.textContent='е·ІеҲ·ж–°';setTimeout(function(){t.classList.remove('show')},1200)})}
fetchQuotes().then(function(){render();tmr=setTimeout(loop,interval())});
setInterval(tick,30000);tick();
</script>
